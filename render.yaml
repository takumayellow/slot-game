services:
  - type: pserv
    name: voicevox-engine
    runtime: image
    image:
      url: docker.io/voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    # CPU版Dockerイメージは512MB以上のRAMが必要なため、starterプラン以上が必要
    plan: starter
    envVars:
      - key: PORT
        value: 50021

  - type: web
    name: slot-voicevox-proxy
    runtime: docker
    repo: https://github.com/takumayellow/slot-game
    rootDir: proxy
    plan: free
    envVars:
      - key: VOICEVOX_ENGINE_URL
        value: http://voicevox-engine:50021
      - key: CORS_ALLOW_ORIGINS
        value: https://takumayellow.github.io
