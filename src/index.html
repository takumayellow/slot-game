<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tsumugi Pachi Slot</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="winFx" class="win-fx" aria-hidden="true"></div>
    <div id="jackpotBanner" class="jackpot-banner" aria-hidden="true">当たり！</div>
    <main class="slot-app">
      <header class="topbar panel">
        <div>
          <h1>Tsumugi Pachi Slot</h1>
          <p class="sub">Red Impact Machine</p>
          <div class="voice-state-row">
            <p class="voice-state" id="voiceState">読み上げ: 接続中...</p>
            <button id="voiceSettingsBtn" type="button" class="voice-settings-btn" title="音声設定">⚙</button>
          </div>
        </div>
        <div class="character">
          <div class="avatar" aria-hidden="true">
            <img src="./assets/tsumugi.png" alt="" />
          </div>
          <p id="charaLine"></p>
        </div>
      </header>

      <section class="play-area">
        <section class="machine panel">
          <section class="status" aria-label="status">
            <div>
              <span class="label">Credit</span>
              <strong id="credit">100</strong>
            </div>
            <div>
              <span class="label">Bet</span>
              <strong id="bet">1</strong>
            </div>
            <div>
              <span class="label">Last Win</span>
              <strong id="lastWin">0</strong>
            </div>
          </section>

          <!-- Win Streak display -->
          <section class="streak-section" id="streakSection" aria-label="win streak">
            <div class="streak-info">
              <span class="label">連勝</span>
              <strong id="winStreak">0</strong>
            </div>
            <div class="streak-info">
              <span class="label">配当倍率</span>
              <strong id="streakMultiplier" class="streak-multiplier">×1</strong>
            </div>
            <div class="streak-guide">
              <span>2連勝: ×1.5</span>
              <span>3連勝: ×2</span>
              <span>5連勝: ×3</span>
            </div>
          </section>

          <section class="reels" aria-label="slot reels">
            <div class="reel" id="reel-0">🍒</div>
            <div class="reel" id="reel-1">🍋</div>
            <div class="reel" id="reel-2">🔔</div>
          </section>

          <section class="controls">
            <button id="betDown" type="button">BET -</button>
            <button id="betUp" type="button">BET +</button>
            <button id="spin" type="button" class="spin">SPIN</button>
            <button id="reset" type="button">RESET</button>
          </section>

          <section class="message" id="message" aria-live="polite">Ready.</section>
        </section>

        <aside class="guide panel">
          <h2>Mini Pay</h2>
          <ul id="payTable"></ul>
          <p class="hint">7 と BAR が高配当．🍒2個でも小当たり．</p>
        </aside>
      </section>
    </main>

    <dialog id="voiceSettingsDialog" class="voice-settings-dialog" aria-labelledby="voiceSettingsTitle">
      <h3 id="voiceSettingsTitle">音声設定（VOICEVOX プロキシ）</h3>
      <p class="dialog-hint">GitHub Pages など HTTPS 環境では、HTTPS 対応のプロキシ URL が必要です。<br>ローカル開発時は空欄のままでOK。</p>
      <label class="dialog-label">
        プロキシ URL
        <input type="url" id="voiceApiInput" class="dialog-input" placeholder="https://your-proxy.example.com/voicevox" />
      </label>
      <p class="dialog-current" id="dialogCurrentUrl"></p>
      <div class="dialog-actions">
        <button id="voiceApiSave" type="button" class="btn-primary">保存して接続</button>
        <button id="voiceApiClear" type="button">クリア</button>
        <button id="voiceApiCancel" type="button">キャンセル</button>
      </div>
    </dialog>

    <script type="module" src="./scripts/ui.js"></script>
  </body>
</html>
